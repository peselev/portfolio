<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Friends RAG pipeline</title>
<desc>A one-time index build on top (raw transcripts, clean and chunk, build Chroma and BM25 index). A run-once evaluation in the middle measures the fuse output with recall@5 and feeds back into chunking above and fusion below. A per-query answer lane on the bottom where a user question enters from outside into retrieve, fuse, generate.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="40" y="18" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="58" y="28" font-size="12" fill="#475467">Build (once)</text>
<rect x="156" y="18" width="12" height="12" rx="2" fill="#ECEBFB" stroke="#4338CA" stroke-width="0.5"/>
<text x="174" y="28" font-size="12" fill="#475467">Answer (per query)</text>
<rect x="316" y="18" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="334" y="28" font-size="12" fill="#475467">Evaluation (once)</text>

<rect x="40" y="44" width="600" height="100" rx="12" fill="none" stroke="#D0D5DD" stroke-width="0.5" stroke-dasharray="4 4"/>

<g>
<rect x="56" y="74" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="136" y="94" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Raw transcripts</text>
<text x="136" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Emory JSON, 130MB</text>
</g>
<g>
<rect x="260" y="74" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="94" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Clean &amp; chunk</text>
<text x="340" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">strip to essentials</text>
</g>
<g>
<rect x="464" y="74" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="544" y="94" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Build index</text>
<text x="544" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Chroma + BM25</text>
</g>

<line x1="220" y1="102" x2="256" y2="102" stroke="#344054" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="424" y1="102" x2="460" y2="102" stroke="#344054" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="272" y="168" width="200" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="372" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Evaluate</text>
<text x="372" y="208" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">recall@5 vs span_qa</text>
</g>

<rect x="168" y="248" width="472" height="100" rx="12" fill="none" stroke="#D0D5DD" stroke-width="0.5" stroke-dasharray="4 4"/>

<g>
<rect x="40" y="278" width="110" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="95" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Question</text>
<text x="95" y="318" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">user query</text>
</g>
<g>
<rect x="184" y="278" width="128" height="56" rx="8" fill="#ECEBFB" stroke="#4338CA" stroke-width="0.5"/>
<text x="248" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2A2470">Retrieve</text>
<text x="248" y="318" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4338CA">vector + BM25</text>
</g>
<g>
<rect x="340" y="278" width="128" height="56" rx="8" fill="#ECEBFB" stroke="#4338CA" stroke-width="0.5"/>
<text x="404" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2A2470">Fuse</text>
<text x="404" y="318" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4338CA">RRF (+ rerank)</text>
</g>
<g>
<rect x="496" y="278" width="128" height="56" rx="8" fill="#ECEBFB" stroke="#4338CA" stroke-width="0.5"/>
<text x="560" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2A2470">Generate</text>
<text x="560" y="318" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4338CA">cited answer</text>
</g>

<line x1="150" y1="306" x2="181" y2="306" stroke="#344054" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="313" y1="306" x2="337" y2="306" stroke="#344054" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="469" y1="306" x2="493" y2="306" stroke="#344054" stroke-width="1.5" marker-end="url(#arrow)"/>

<path d="M544 130 L544 155 L248 155 L248 276" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<text x="460" y="149" text-anchor="middle" font-size="12" fill="#667085">index feeds retrieval</text>

<line x1="388" y1="278" x2="388" y2="226" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="420" y1="224" x2="420" y2="276" stroke="#639922" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<line x1="340" y1="168" x2="340" y2="132" stroke="#639922" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
</svg>
